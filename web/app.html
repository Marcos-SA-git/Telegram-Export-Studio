<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Telegram Export Studio — App</title>
<meta name="description" content="Fusiona, compacta y mejora exportaciones de Telegram, 100% en tu navegador.">
<style>
:root {
  --bg: #f6f8fb; --surface: #fff; --surface-2: #eef3f9; --outline: #e2e8f0;
  --on: #1a1f24; --muted: #62707d;
  --primary: #2296d4; --primary-strong: #1181bd; --primary-soft: #e5f3fb;
  --ok: #1e8e3e; --err: #d93025; --warn: #b26a00; --warn-soft: #fdf3e3;
  --shadow: 0 1px 2px rgba(20,40,60,.06), 0 4px 16px rgba(20,40,60,.07);
  --radius: 20px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1418; --surface: #1a2128; --surface-2: #232c35; --outline: #2d3944;
    --on: #e8edf2; --muted: #94a3b1;
    --primary: #4db8ec; --primary-strong: #6ec6f1; --primary-soft: #173341;
    --ok: #6dd58c; --err: #f28b82; --warn: #f5b954; --warn-soft: #33290f;
    --shadow: 0 1px 2px rgba(0,0,0,.35), 0 6px 20px rgba(0,0,0,.3);
  }
}
* { box-sizing: border-box; margin: 0; }
html { color-scheme: light dark; }
body {
  background: var(--bg); color: var(--on);
  font: 15px/1.5 "Segoe UI Variable Text", "Segoe UI", -apple-system,
        "SF Pro Text", Roboto, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 70px;
}
.wrap { max-width: 720px; margin: 0 auto; padding: 0 20px; }

/* topbar */
.topbar { display: flex; align-items: center; gap: 12px;
  max-width: 720px; margin: 0 auto; padding: 18px 20px 22px; }
.topbar .mini-logo { width: 38px; height: 38px; border-radius: 11px; flex: none;
  background: linear-gradient(135deg, #2aabee, #1683c9);
  display: grid; place-items: center; box-shadow: 0 4px 14px rgba(34,150,212,.35); }
.topbar .mini-logo svg { width: 20px; height: 20px; fill: #fff; transform: translateX(-1px); }
.topbar a.home { font-weight: 650; font-size: 16px; color: var(--on); text-decoration: none; }
.topbar .grow { flex: 1; }
select.lang { appearance: none; font: inherit; font-size: 13px; font-weight: 600;
  color: var(--muted); background: var(--surface-2); border: 0;
  border-radius: 999px; padding: 8px 14px; cursor: pointer; outline: none; }

/* loader */
#loader .spinner-big { width: 44px; height: 44px; border-radius: 50%;
  border: 4px solid var(--primary-soft); border-top-color: var(--primary);
  animation: spin .8s linear infinite; margin: 6px auto 16px; }
#loader { text-align: center; }
#loader h2 { text-transform: none; letter-spacing: 0; font-size: 16.5px;
  color: var(--on); margin-bottom: 6px; }
#loader p { font-size: 13.5px; color: var(--muted); }
#loader .progress { margin-top: 18px; }

/* shared UI */
.card { background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 22px 24px; margin-bottom: 16px;
  animation: rise .35s cubic-bezier(.2,.7,.3,1) both; }
@keyframes rise { from { opacity: 0; transform: translateY(10px); } }
.card h2 { font-size: 12.5px; font-weight: 650; letter-spacing: .8px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.btn { appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 600;
  border-radius: 999px; transition: all .2s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
.btn:active { transform: scale(.97); }
.btn.filled { background: linear-gradient(135deg, #2aabee, #1a8fd1); color: #fff;
  padding: 14px 30px; font-size: 15.5px; box-shadow: 0 6px 20px rgba(34,150,212,.35); }
.btn.filled:hover { box-shadow: 0 8px 26px rgba(34,150,212,.45); filter: brightness(1.04); }
.btn.filled:disabled { background: var(--surface-2); color: var(--muted);
  box-shadow: none; cursor: default; transform: none; }
.btn.filled.wide { width: 100%; }
.btn.tonal { background: var(--primary-soft); color: var(--primary-strong);
  padding: 12px 24px; font-size: 14.5px; }
.btn.danger-tonal { background: color-mix(in srgb, var(--err) 12%, transparent);
  color: var(--err); padding: 14px 20px; font-size: 14.5px; }
.btn svg { width: 18px; height: 18px; fill: currentColor; }

.tabs { display: inline-flex; background: var(--surface-2); border-radius: 999px;
  padding: 4px; margin-bottom: 20px; position: relative; }
.tabs button { appearance: none; border: 0; background: none; color: var(--muted);
  font: inherit; font-weight: 600; font-size: 14px; cursor: pointer;
  padding: 8px 20px; border-radius: 999px; position: relative; z-index: 1; transition: color .25s; }
.tabs button.active { color: var(--on); }
.tabs .pill { position: absolute; top: 4px; bottom: 4px; border-radius: 999px;
  background: var(--surface); box-shadow: var(--shadow);
  transition: left .3s cubic-bezier(.4,0,.2,1), width .3s cubic-bezier(.4,0,.2,1); }

.empty { border: 1.5px dashed var(--outline); border-radius: 14px; padding: 26px;
  text-align: center; color: var(--muted); font-size: 13.5px; margin-bottom: 10px;
  cursor: pointer; transition: all .2s; }
.empty:hover { border-color: var(--primary); color: var(--primary-strong); }
.empty.mini { padding: 13px; }
.empty svg { width: 28px; height: 28px; fill: var(--muted); opacity: .55;
  display: block; margin: 0 auto 8px; }
.empty.mini svg { width: 18px; height: 18px; margin-bottom: 3px; }
.card.dropping { outline: 2px dashed var(--primary); outline-offset: -8px;
  background: color-mix(in srgb, var(--primary) 6%, var(--surface)); }

.export-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px;
  border: 1px solid var(--outline); border-radius: 14px; margin-bottom: 10px;
  animation: rise .3s cubic-bezier(.2,.7,.3,1) both; }
.export-item .ficon { width: 40px; height: 40px; border-radius: 11px; flex: none;
  background: var(--primary-soft); display: grid; place-items: center; }
.export-item .ficon svg { width: 20px; height: 20px; fill: var(--primary); }
.export-item .info { flex: 1; min-width: 0; }
.export-item .info b { font-size: 14.5px; font-weight: 600; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.export-item .info span { font-size: 12.5px; color: var(--muted); display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.iconbtn { appearance: none; border: 0; background: none; cursor: pointer;
  width: 36px; height: 36px; border-radius: 50%; flex: none;
  display: grid; place-items: center; transition: background .2s; }
.iconbtn svg { width: 19px; height: 19px; fill: var(--muted); }
.iconbtn:hover { background: var(--surface-2); }
.iconbtn:hover svg { fill: var(--err); }

.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { appearance: none; cursor: pointer; font: inherit; font-size: 13.5px;
  font-weight: 600; color: var(--muted); background: var(--surface);
  border: 1.5px solid var(--outline); border-radius: 999px; padding: 8px 16px; transition: all .2s; }
.chip:hover { background: var(--surface-2); }
.chip.sel { background: var(--primary-soft); border-color: var(--primary); color: var(--primary-strong); }
.label { font-size: 13.5px; font-weight: 600; margin: 18px 0 10px; }
.label:first-of-type { margin-top: 0; }
.hint { font-size: 12.5px; color: var(--muted); margin-top: 12px; }
.field { display: flex; gap: 10px; align-items: center; }
.field input, .field select { flex: 1; font: inherit; color: var(--on);
  background: var(--surface-2); border: 1.5px solid transparent; border-radius: 12px;
  padding: 11px 14px; outline: none; min-width: 0; transition: all .2s; }
.field input:focus, .field select:focus { border-color: var(--primary); background: var(--surface); }
select.unit { flex: none; width: 84px; }
.custom-size { display: none; margin-top: 12px; max-width: 260px; }
.custom-size.show { display: flex; }

.switchrow { display: flex; align-items: center; gap: 14px; padding: 11px 0;
  border-bottom: 1px solid var(--outline); }
.switchrow:last-of-type { border-bottom: 0; }
.switchrow .sw-txt { flex: 1; min-width: 0; }
.switchrow .sw-txt b { font-size: 14px; font-weight: 600; display: block; }
.switchrow .sw-txt span { font-size: 12.5px; color: var(--muted); display: block; }
.switch { position: relative; width: 46px; height: 26px; flex: none; }
.switch input { position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; margin: 0; cursor: pointer; z-index: 1; }
.switch i { position: absolute; inset: 0; border-radius: 999px;
  background: var(--surface-2); border: 1.5px solid var(--outline); transition: all .2s; }
.switch i::after { content: ""; position: absolute; top: 3px; left: 3px;
  width: 17px; height: 17px; border-radius: 50%; background: var(--muted); transition: all .2s; }
.switch input:checked + i { background: var(--primary); border-color: var(--primary); }
.switch input:checked + i::after { left: 22px; background: #fff; }
.subopts { transition: opacity .25s; }
.subopts.off { opacity: .4; pointer-events: none; }
.seg2 { display: inline-flex; background: var(--surface-2); border-radius: 12px;
  padding: 4px; gap: 2px; }
.seg2 button { appearance: none; border: 0; background: none; font: inherit;
  font-size: 13.5px; font-weight: 600; color: var(--muted); padding: 8px 16px;
  border-radius: 9px; cursor: pointer; transition: all .2s; }
.seg2 button.active { background: var(--surface); color: var(--on); box-shadow: var(--shadow); }
.action-row { display: flex; gap: 10px; }
.action-row .btn.filled { flex: 1; }

#job { display: none; }
#job.show { display: block; }
.job-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.spinner { width: 22px; height: 22px; flex: none; border-radius: 50%;
  border: 3px solid var(--primary-soft); border-top-color: var(--primary);
  animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.job-head b { flex: 1; font-size: 15px; font-weight: 600; }
.job-head .pct { font-size: 13.5px; font-weight: 700; color: var(--primary-strong); }
.progress { height: 6px; border-radius: 6px; overflow: hidden;
  background: var(--primary-soft); margin-bottom: 4px; }
.progress i { display: block; height: 100%; width: 0%;
  background: linear-gradient(90deg, #2aabee, #1a8fd1); border-radius: 6px;
  transition: width .3s cubic-bezier(.2,.7,.3,1); }
.progress.indet i { width: 40% !important;
  animation: slide 1.2s cubic-bezier(.4,0,.6,1) infinite; }
@keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
.warns { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.warn-item { display: flex; gap: 10px; align-items: flex-start;
  background: var(--warn-soft); border-radius: 12px; padding: 10px 14px;
  font-size: 13px; color: var(--warn); animation: rise .3s both; }
.warn-item svg { width: 17px; height: 17px; fill: var(--warn); flex: none; margin-top: 1px; }
.warn-item span { word-break: break-all; }
.result { display: none; align-items: flex-start; gap: 14px; margin-top: 16px; }
.result.show { display: flex; }
.result .ricon { width: 40px; height: 40px; border-radius: 50%; flex: none;
  display: grid; place-items: center; }
.result .ricon.ok { background: color-mix(in srgb, var(--ok) 14%, transparent); }
.result .ricon.err { background: color-mix(in srgb, var(--err) 14%, transparent); }
.result .ricon svg { width: 22px; height: 22px; }
.result .ricon.ok svg { fill: var(--ok); }
.result .ricon.err svg { fill: var(--err); }
.result b { display: block; font-size: 15px; margin-bottom: 2px; }
.result p { font-size: 13.5px; color: var(--muted); word-break: break-word; }

#snack { position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 80px);
  background: var(--on); color: var(--bg); font-size: 14px; font-weight: 500;
  padding: 13px 22px; border-radius: 12px; box-shadow: var(--shadow);
  opacity: 0; transition: all .3s cubic-bezier(.2,.7,.3,1); max-width: 90vw; z-index: 50; }
#snack.show { transform: translate(-50%, 0); opacity: 1; }
.srclink { display: inline-flex; align-items: center; gap: 6px;
  margin-top: 14px; font-size: 12.5px; color: var(--muted);
  text-decoration: none; opacity: .75; transition: opacity .2s; }
.srclink:hover { opacity: 1; text-decoration: underline; }
.srclink svg { width: 14px; height: 14px; fill: currentColor; flex: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="mini-logo"><svg viewBox="0 0 24 24"><path d="M21.4 3.1 2.2 10.5c-1 .4-1 1.8.1 2.1l4.9 1.5 1.9 5.9c.3.9 1.4 1.1 2 .4l2.7-2.8 4.9 3.6c.8.6 2 .2 2.2-.9l3-15.3c.2-1.2-.9-2.1-2-1.7l-.5-.2zM8.5 13.8l9.5-6-7.3 7.1-.3 3.2-1.9-4.3z"/></svg></div>
  <a class="home" href="index.html">Telegram Export Studio</a>
  <div class="grow"></div>
  <select class="lang" id="lang">
    <option value="es">🌐 ES</option><option value="en">🌐 EN</option>
    <option value="fr">🌐 FR</option><option value="de">🌐 DE</option>
    <option value="pt">🌐 PT</option><option value="it">🌐 IT</option>
    <option value="ru">🌐 RU</option><option value="zh">🌐 中文</option>
    <option value="ja">🌐 日本語</option><option value="hi">🌐 हिन्दी</option>
    <option value="ar">🌐 العربية</option>
  </select>
</div>

<div class="wrap">
  <div class="card" id="unsupported" style="display:none">
    <h2 data-i18n="unsup_h"></h2>
    <p style="font-size:14px" data-i18n="unsup_p"></p>
    <div style="margin-top:14px"><a class="btn tonal" id="download-link" target="_blank" rel="noopener" data-i18n="cta_download"></a></div>
  </div>

  <div class="card" id="loader">
    <div class="spinner-big"></div>
    <h2 data-i18n="loader_h"></h2>
    <p id="boot-status"></p>
    <div class="progress indet"><i></i></div>
    <p class="hint" data-i18n="loader_hint"></p>
  </div>

  <div id="studio" style="display:none">
    <div class="tabs" id="tabs">
      <div class="pill" id="pill"></div>
      <button data-view="fuse" class="active" data-i18n="tab_fuse"></button>
      <button data-view="compact" data-i18n="tab_compact"></button>
      <button data-view="enhance" data-i18n="tab_enhance"></button>
    </div>

    <!-- FUSE -->
    <section id="view-fuse">
      <div class="card" id="fuse-card">
        <h2 data-i18n="fuse_sources"></h2>
        <div id="export-list"></div>
        <div class="empty" id="export-empty" onclick="addExport()">
          <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          <span id="export-empty-text"></span>
        </div>
      </div>
      <div class="card">
        <h2 data-i18n="dest_pagination"></h2>
        <div class="label" data-i18n="size_label"></div>
        <div class="chips" id="fuse-chips">
          <button class="chip sel" data-size="500KB">500 KB</button>
          <button class="chip" data-size="1MB">1 MB</button>
          <button class="chip" data-size="5MB">5 MB</button>
          <button class="chip" data-size="0" data-i18n="chip_single"></button>
          <button class="chip" data-size="custom" data-i18n="chip_custom"></button>
        </div>
        <div class="field custom-size" id="fuse-custom">
          <input type="number" id="fuse-custom-n" value="2" min="1">
          <select class="unit" id="fuse-custom-u"><option>MB</option><option>KB</option></select>
        </div>
        <div class="hint" data-i18n="fuse_out_hint"></div>
      </div>
      <button class="btn filled wide" id="fuse-btn" onclick="runFuse()" disabled>
        <svg viewBox="0 0 24 24"><path d="M17 20.41 18.41 19 15 15.59 13.59 17 17 20.41zM7.5 8H11v5.59L5.59 19 7 20.41l6-6V8h3.5L12 3.5 7.5 8z"/></svg>
        <span id="fuse-btn-label"></span>
      </button>
      <div><a class="srclink" href="#" target="_blank" rel="noopener"><svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.42 7.42 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg><span data-i18n="srclink"></span></a></div>
    </section>

    <!-- COMPACT -->
    <section id="view-compact" style="display:none">
      <div class="card" id="compact-card">
        <h2 data-i18n="compact_source"></h2>
        <div id="compact-sel" class="empty" onclick="pickCompact()">
          <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
          <span data-i18n="compact_pick"></span>
        </div>
        <div id="compact-info" style="display:none">
          <div class="export-item" style="margin-bottom:0">
            <div class="ficon"><svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div>
            <div class="info"><b id="ci-name"></b><span id="ci-sub"></span></div>
            <button class="iconbtn" onclick="clearCompact()"><svg viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
          </div>
        </div>
      </div>
      <div class="card">
        <h2 data-i18n="goal"></h2>
        <div class="seg2" id="compact-mode">
          <button data-mode="files" class="active" data-i18n="mode_files"></button>
          <button data-mode="size" data-i18n="mode_size"></button>
        </div>
        <div id="compact-files" style="margin-top:16px">
          <div class="field" style="max-width:200px"><input type="number" id="files-n" value="1" min="1"></div>
        </div>
        <div class="hint" style="margin-top:12px" id="goal-hint"></div>
        <div id="compact-size" style="display:none;margin-top:16px">
          <div class="chips" id="compact-chips">
            <button class="chip sel" data-size="1MB">1 MB</button>
            <button class="chip" data-size="5MB">5 MB</button>
            <button class="chip" data-size="custom" data-i18n="chip_custom"></button>
          </div>
          <div class="field custom-size" id="compact-custom">
            <input type="number" id="compact-custom-n" value="2" min="1">
            <select class="unit" id="compact-custom-u"><option>MB</option><option>KB</option></select>
          </div>
        </div>
      </div>
      <button class="btn filled wide" id="compact-btn" onclick="runCompact()" disabled>
        <svg viewBox="0 0 24 24"><path d="M7.41 18.59 8.83 20 12 16.83 15.17 20l1.41-1.41L12 14l-4.59 4.59zm9.18-13.18L15.17 4 12 7.17 8.83 4 7.41 5.41 12 10l4.59-4.59z"/></svg>
        <span data-i18n="compact_btn"></span>
      </button>
      <div><a class="srclink" href="#" target="_blank" rel="noopener"><svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.42 7.42 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg><span data-i18n="srclink"></span></a></div>
    </section>

    <!-- ENHANCE -->
    <section id="view-enhance" style="display:none">
      <div class="card" id="enhance-card">
        <h2 data-i18n="enhance_source"></h2>
        <div id="enhance-sel" class="empty" onclick="pickEnhance()">
          <svg viewBox="0 0 24 24"><path d="M12 2 9.2 8.6 2 9.3l5.5 4.7L5.8 21 12 17.3 18.2 21l-1.7-7 5.5-4.7-7.2-.7z"/></svg>
          <span data-i18n="enhance_pick"></span>
        </div>

  if (vars) for (const k in vars) s = s.split("{" + k + "}").join(vars[k]);

}

  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === "ar" ? "rtl" : "ltr";

        h = p.read_text(encoding="utf-8")
        ids.update(int(m) for m in re.findall(r'id="message(\d+)"', h))
        senders.update(s.strip() for s in F.FROM_NAME_RE.findall(h))
        if title is None:
            tm = re.search(r'<div class="text bold">\s*\n(.*?)\n', h)
            title = tm.group(1).strip() if tm else None
        ds = F.DATE_TITLE_RE.findall(h)
        if ds:
            if first is None:
                first = "/".join(ds[0][:3])
            last = "/".join(ds[-1][:3])
    return json.dumps({
        "title": title, "messages": len(ids),
        "pages": [p.name for p in pages],
        "first": first, "last": last,
        "senders": [{"name": n, "count": c} for n, c in senders.most_common()],
        "kind": "group" if len(senders) > 2 else "private",
        "enhanced": "css/enhanced.css" in
                    pages[0].read_text(encoding="utf-8")[:4000],
    })

def run_fuse(paths_json, out, page_size, force, media_maps_json):
    paths = [Path(p) for p in json.loads(paths_json)]
    F.media_maps = json.loads(media_maps_json)
    try:
        res = F.fuse(F.order_exports(paths), Path(out),
                     F.parse_size(page_size), force=bool(force))
    finally:
        F.media_maps = None
    return json.dumps(res)

def run_compact(path, files, size):
    if files:
        res = C.compact(Path(path), int(files), None)
    else:
        res = C.compact(Path(path), None, F.parse_size(size))
    return json.dumps(res)

def run_enhance(path, me, layout, features_json, fullwidth):
    res = E.enhance(Path(path), me or None, layout,
                    json.loads(features_json), fullwidth=bool(fullwidth))
    return json.dumps(res)

def run_restore(path):
    return json.dumps(E.restore(Path(path)))
`;

async function boot() {
  $("boot-status").textContent = t("boot_loading");
  try {
    pyodide = await loadPyodide();
    $("boot-status").textContent = t("boot_engine");
    for (const f of ENGINE) {
      const r = await fetch(f);
      if (!r.ok) throw new Error("fetch " + f + ": " + r.status);
      pyodide.FS.writeFile("/home/pyodide/" + f, await r.text());
    }
    pyodide.FS.writeFile("/home/pyodide/web_glue.py", GLUE_PY);
    glue = pyodide.pyimport("web_glue");
    glue.set_progress(onPyProgress);
    $("loader").style.display = "none";
    $("studio").style.display = "";
    applyLang();
  } catch (e) {
    $("boot-status").textContent = String(e);
  }
}

/* ================= FS plumbing ================= */
const HTML_RE = /^messages\d*\.html$/;
const ASSETS = ["css", "js", "images"];

async function dirFromDrop(e) {
  const out = [];
  for (const item of e.dataTransfer.items) {
    if (item.getAsFileSystemHandle) {
      const h = await item.getAsFileSystemHandle();
      if (h && h.kind === "directory") out.push(h);
    }
  }
  return out;
}
function wireDrop(el, onHandle) {
  ["dragover", "dragenter"].forEach(ev => el.addEventListener(ev, e => {
    e.preventDefault();
    el.classList.add("dropping");
  }));
  el.addEventListener("dragleave", e => {
    if (!el.contains(e.relatedTarget)) el.classList.remove("dropping");
  });
  el.addEventListener("drop", async e => {
    e.preventDefault();
    el.classList.remove("dropping");
    if (!glue) return;
    for (const h of await dirFromDrop(e)) {
      try { await onHandle(h); } catch (err) { snack(pyError(err)); }
    }
  });
}

async function loadHtmlsToFS(handle, target) {
  try { pyodide.FS.mkdirTree(target); } catch (_) {}
  for (const n of pyodide.FS.readdir(target)) {
    if (HTML_RE.test(n)) pyodide.FS.unlink(target + "/" + n);
  }
  let found = false;
  for await (const [name, h] of handle.entries()) {
    if (h.kind === "file" && HTML_RE.test(name)) {
      const buf = new Uint8Array(await (await h.getFile()).arrayBuffer());
      pyodide.FS.writeFile(target + "/" + name, buf);
      found = true;
    }
  }
  if (!found) throw new Error(t("drop_no_messages", { name: handle.name }));
}

async function writeBackPages(target, handle, pageNames) {
  for (const name of pageNames) {
    const data = pyodide.FS.readFile(target + "/" + name);
    const fh = await handle.getFileHandle(name, { create: true });
    const w = await fh.createWritable();
    await w.write(data);
    await w.close();
  }
  const keep = new Set(pageNames);
  const stale = [];
  for await (const [name, h] of handle.entries()) {
    if (h.kind === "file" && HTML_RE.test(name) && !keep.has(name)) stale.push(name);
  }
  for (const name of stale) await handle.removeEntry(name);
}

async function copyMediaTree(srcHandle, outHandle, written, includeAssets) {
  const renames = {};
  async function walk(src, dst, rel) {
    for await (const [name, h] of src.entries()) {
      if (h.kind === "directory") {
        const isAsset = rel === "" && ASSETS.includes(name);
        if (isAsset && !includeAssets) continue;
        await walk(h, await dst.getDirectoryHandle(name, { create: true }),
                   rel + name + "/");
        continue;
      }
      if (rel === "") continue;
      const isAsset = ASSETS.includes(rel.split("/")[0]);
      const f = await h.getFile();
      let target = rel + name;
      if (written.has(target)) {
        if (isAsset || written.get(target) === f.size) continue;
        let n = 2;
        const dot = name.indexOf(".");
        const stem = dot < 0 ? name : name.slice(0, dot);
        const ext = dot < 0 ? "" : name.slice(dot);
        let cand;
        do { cand = rel + stem + "__" + n + ext; n++; }
        while (written.has(cand) && written.get(cand) !== f.size);
        renames[target] = cand;
        if (written.has(cand)) continue;
        target = cand;
      }
      const tName = target.slice(target.lastIndexOf("/") + 1);
      const fh = await dst.getFileHandle(tName, { create: true });
      await f.stream().pipeTo(await fh.createWritable());
      written.set(target, f.size);
      mediaDone++;
      setStage(t("stage_media", { n: mediaDone }), null);
    }
  }
  await walk(srcHandle, outHandle, "");
  return renames;
}

/* ================= job UI ================= */
function showJob(title) {
  $("job").classList.add("show");
  $("job-stage").textContent = title;
  $("job-pct").textContent = "";
  $("job-spin").style.display = "";
  $("job-progress").classList.add("indet");
  $("job-bar").style.width = "0%";
  $("job-warns").innerHTML = "";
  $("job-result").classList.remove("show");
  document.querySelectorAll(".btn.filled").forEach(b => b.disabled = true);
  $("job").scrollIntoView({ behavior: "smooth", block: "nearest" });
}
function setStage(text, frac) {
  $("job-stage").textContent = text;
  if (typeof frac === "number") {
    $("job-progress").classList.remove("indet");
    $("job-bar").style.width = Math.round(frac * 100) + "%";
    $("job-pct").textContent = Math.round(frac * 100) + "%";
  } else {
    $("job-progress").classList.add("indet");
    $("job-pct").textContent = "";
  }
}
function pushWarn(text) {
  const div = document.createElement("div");
  div.className = "warn-item";
  div.innerHTML = '<svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg><span></span>';
  div.querySelector("span").textContent = text;
  $("job-warns").appendChild(div);
}
function onPyProgress(kind, payloadJson) {
  const p = JSON.parse(payloadJson);
  if (kind === "warn") return pushWarn(p);
  setStage(t("stage_" + p.key, { name: p.name || "", n: p.copied || 0 }),
           typeof p.frac === "number" ? p.frac : null);
}
function endJob(ok, res, errText) {
  $("job-spin").style.display = "none";
  $("job-progress").classList.remove("indet");
  $("job-bar").style.width = "100%";
  $("job-pct").textContent = "";
  document.querySelectorAll(".btn.filled").forEach(b => b.disabled = false);
  renderExports();
  if (!state.compact) $("compact-btn").disabled = true;
  if (!state.enhance) $("enhance-btn").disabled = true;
  const icon = $("job-ricon");
  $("job-result").classList.add("show");
  if (ok) {
    $("job-stage").textContent = t("job_done");
    icon.className = "ricon ok";
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
    $("job-rtitle").textContent =
      t("res_summary", { msgs: res.messages, pages: res.pages.length });
    $("job-rsub").textContent = t("res_written");
  } else {
    $("job-stage").textContent = t("job_error");
    icon.className = "ricon err";
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
    $("job-rtitle").textContent = t("job_failed");
    $("job-rsub").textContent = errText || "";
  }
}

/* ================= fuse ================= */
function kindLabel(e) {
  return e.kind === "group"
    ? t("kind_group", { n: e.senders.length }) : t("kind_private");
}
function itemSub(e) {
  return kindLabel(e) + " · "
    + t("item_sub", { msgs: e.messages, pages: e.pages.length })
    + (e.first ? " · " + e.first + " → " + e.last : "");
}
function renderExports() {
  const list = $("export-list");
  if (!list) return;
  list.innerHTML = "";
  state.exports.forEach((e, i) => {
    const div = document.createElement("div");
    div.className = "export-item";
    div.innerHTML = '<div class="ficon"><svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div>'
      + '<div class="info"><b></b><span></span></div>'
      + '<button class="iconbtn"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>';
    div.querySelector("b").textContent =
      e.handle.name + (e.title ? " — " + e.title : "");
    div.querySelector("span").textContent = itemSub(e);
    div.querySelector(".iconbtn").onclick = () => {
      state.exports.splice(i, 1);
      renderExports();
    };
    list.appendChild(div);
  });
  const n = state.exports.length;
  $("export-empty").classList.toggle("mini", n > 0);
  $("export-empty-text").textContent = t(n ? "fuse_add_more" : "fuse_empty");
  $("fuse-btn").disabled = n < 2 || !glue;
  $("fuse-btn-label").textContent = n < 2 ? t("fuse_btn") : t("fuse_btn_n", { n });
}

async function inspectHandle(handle, target) {
  await loadHtmlsToFS(handle, target);
  const info = JSON.parse(glue.inspect(target));
  info.handle = handle;
  info.target = target;
  return info;
}

async function addExportHandle(handle) {
  for (const e of state.exports) {
    if (await handle.isSameEntry(e.handle)) return snack(t("snack_dup"));
  }
  const info = await inspectHandle(handle, "/work/ex" + state.exports.length);
  if (state.exports.length) {
    const first = state.exports[0];
    if (first.title && info.title && first.title !== info.title) {
      if (!confirm(t("confirm_mix", { a: info.title, b: first.title }))) return;
      state.forceMix = true;
    } else if (first.kind !== info.kind) {
      if (!confirm(t("confirm_kind"))) return;
      state.forceMix = true;
    }
  }
  state.exports.push(info);
  renderExports();
}
async function addExport() {
  if (!glue) return;
  try {
    const h = await showDirectoryPicker({ id: "tgx-in" });
    await addExportHandle(h);
  } catch (e) { if (e.name !== "AbortError") snack(pyError(e)); }
}

async function runFuse() {
  let out;
  try {
    out = await showDirectoryPicker({ id: "tgx-out", mode: "readwrite" });
  } catch (e) { return; }
  for (const e of state.exports) {
    if (await out.isSameEntry(e.handle)) return snack("⚠ output = input");
  }
  showJob(t("job_fusing"));
  try {
    mediaDone = 0;
    const maps = {};
    const written = new Map();
    for (let i = 0; i < state.exports.length; i++) {
      maps["/work/ex" + i] = await copyMediaTree(
        state.exports[i].handle, out, written, i === 0);
    }
    setStage(t("stage_reading"), null);
    for (let i = 0; i < state.exports.length; i++) {
      await loadHtmlsToFS(state.exports[i].handle, "/work/ex" + i);
    }
    try { pyodide.FS.mkdirTree("/out"); } catch (_) {}
    const paths = state.exports.map((_, i) => "/work/ex" + i);
    const res = JSON.parse(glue.run_fuse(
      JSON.stringify(paths), "/out",
      chipValue("fuse-chips", "fuse-custom-n", "fuse-custom-u"),
      state.forceMix, JSON.stringify(maps)));
    setStage(t("stage_saving"), null);
    await writeBackPages("/out", out, res.pages);
    endJob(true, res);
  } catch (e) {
    endJob(false, null, pyError(e));
  }
}

/* ================= compact ================= */
async function setCompactHandle(handle) {
  const info = await inspectHandle(handle, "/work/c");
  state.compact = info;
  $("ci-name").textContent = handle.name + (info.title ? " — " + info.title : "");
  $("ci-sub").textContent = itemSub(info);
  $("compact-sel").style.display = "none";
  $("compact-info").style.display = "";
  $("compact-btn").disabled = false;
}
async function pickCompact() {
  if (!glue) return;
  try {
    const h = await showDirectoryPicker({ id: "tgx-in", mode: "readwrite" });
    await setCompactHandle(h);
  } catch (e) { if (e.name !== "AbortError") snack(pyError(e)); }
}
function clearCompact() {
  state.compact = null;
  $("compact-sel").style.display = "";
  $("compact-info").style.display = "none";
  $("compact-btn").disabled = true;
}
async function runCompact() {
  if (!state.compact) return;
  showJob(t("job_compacting"));
  try {
    await loadHtmlsToFS(state.compact.handle, "/work/c");
    const mode = document.querySelector("#compact-mode button.active").dataset.mode;
    const res = JSON.parse(mode === "files"
      ? glue.run_compact("/work/c", $("files-n").value || "1", null)
      : glue.run_compact("/work/c", null,
          chipValue("compact-chips", "compact-custom-n", "compact-custom-u")));
    setStage(t("stage_saving"), null);
    await writeBackPages("/work/c", state.compact.handle, res.pages);
    endJob(true, res);
  } catch (e) { endJob(false, null, pyError(e)); }
}

/* ================= enhance / restore ================= */
function renderMeOptions() {
  const sel = $("me-select");
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = "";
  const none = document.createElement("option");
  none.value = "";
  none.textContent = t("me_none");
  sel.appendChild(none);
  (state.enhance ? state.enhance.senders : []).forEach(s => {
    const o = document.createElement("option");
    o.value = s.name;
    o.textContent = s.name + " (" + s.count + ")";
    sel.appendChild(o);
  });
  if ([...sel.options].some(o => o.value === current)) sel.value = current;
}
async function setEnhanceHandle(handle) {
  const info = await inspectHandle(handle, "/work/e");
  state.enhance = info;
  $("ei-name").textContent = handle.name + (info.title ? " — " + info.title : "");
  $("ei-sub").textContent = itemSub(info);
  renderMeOptions();
  if (info.enhanced) snack(t("already_enhanced"));
  $("enhance-sel").style.display = "none";
  $("enhance-info").style.display = "";
  $("enhance-btn").disabled = false;
  $("restore-btn").style.display = info.enhanced ? "" : "none";
}
async function pickEnhance() {
  if (!glue) return;
  try {
    const h = await showDirectoryPicker({ id: "tgx-in", mode: "readwrite" });
    await setEnhanceHandle(h);
  } catch (e) { if (e.name !== "AbortError") snack(pyError(e)); }
}
function clearEnhance() {
  state.enhance = null;
  $("enhance-sel").style.display = "";
  $("enhance-info").style.display = "none";
  $("enhance-btn").disabled = true;
  $("restore-btn").style.display = "none";
}
async function writeAsset(handle, dir, name, fsPath) {
  const dh = await handle.getDirectoryHandle(dir, { create: true });
  const fh = await dh.getFileHandle(name, { create: true });
  const w = await fh.createWritable();
  await w.write(pyodide.FS.readFile(fsPath));
  await w.close();
}
async function removeAsset(handle, dir, name) {
  try {
    const dh = await handle.getDirectoryHandle(dir);
    await dh.removeEntry(name);
  } catch (_) {}
}
async function runEnhance() {
  if (!state.enhance) return;
  const f = {
    bubbles: $("opt-bubbles").checked, quotes: $("opt-quotes").checked,
    theme: $("opt-theme").checked, media: $("opt-media").checked,
    note: $("opt-note").checked
  };
  const layout = $("layout-chips").querySelector(".chip.sel").dataset.layout;
  const me = $("me-select").value;
  if (f.bubbles && !me && layout !== "original") return snack(t("need_me"));
  showJob(t("job_enhancing"));
  try {
    await loadHtmlsToFS(state.enhance.handle, "/work/e");
    const res = JSON.parse(glue.run_enhance(
      "/work/e", me, layout, JSON.stringify(f), $("opt-fullwidth").checked));
    setStage(t("stage_saving"), null);
    await writeBackPages("/work/e", state.enhance.handle, res.pages);
    await writeAsset(state.enhance.handle, "css", "enhanced.css", "/work/e/css/enhanced.css");
    await writeAsset(state.enhance.handle, "js", "enhanced.js", "/work/e/js/enhanced.js");
    endJob(true, res);
    await setEnhanceHandle(state.enhance.handle);
  } catch (e) { endJob(false, null, pyError(e)); }
}
async function runRestore() {
  if (!state.enhance) return;
  showJob(t("job_restoring"));
  try {
    await loadHtmlsToFS(state.enhance.handle, "/work/e");
    const res = JSON.parse(glue.run_restore("/work/e"));
    setStage(t("stage_saving"), null);
    await writeBackPages("/work/e", state.enhance.handle, res.pages);
    await removeAsset(state.enhance.handle, "css", "enhanced.css");
    await removeAsset(state.enhance.handle, "js", "enhanced.js");
    endJob(true, res);
    await setEnhanceHandle(state.enhance.handle);
  } catch (e) { endJob(false, null, pyError(e)); }
}
