.cta-main:active { transform: scale(.98); }
.cta-main svg { width: 24px; height: 24px; fill: currentColor; }
.cta-main::after {

  border: 2px solid rgba(42,171,238,.4); animation: pulse 2.2s ease-out infinite;
  pointer-events: none;
}
@keyframes pulse {

  70%, 100% { transform: scale(1.12); opacity: 0; }
}
.cta-sub { display: block; margin-top: 14px; font-size: 12.5px; color: var(--muted); }
.cta-secondary { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 26px; }

let LANG = localStorage.getItem("tgxweb-lang");
if (!I18N[LANG]) {
  const nav = (navigator.language || "en").slice(0, 2).toLowerCase();
  LANG = I18N[nav] ? nav : "en";
}
function t(key) { return (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key; }
function applyLang() {
  document.documentElement.lang = LANG;
  document.documentElement.dir = LANG === "ar" ? "rtl" : "ltr";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.getElementById("lang").value = LANG;
}
document.getElementById("lang").onchange = e => {
  LANG = e.target.value;
  localStorage.setItem("tgxweb-lang", LANG);
  applyLang();
};
document.getElementById("source-link").href = REPO_URL;
document.getElementById("source-link2").href = REPO_URL;
document.getElementById("download-link").href = REPO_URL + "/releases";
applyLang();
</script>
